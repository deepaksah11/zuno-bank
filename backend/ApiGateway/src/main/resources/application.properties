spring.application.name=ApiGateway
server.port=8080

jwt.secretKey=jasdkfu43y57et8ewjirfg5ruhf84hj5x8zrh49ehfuir894uet8gijfierfi

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=AUTH-SERVICE
spring.cloud.gateway.routes[0].uri=lb://AUTHENTICATION
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=AUTH-STAFF
spring.cloud.gateway.routes[1].uri=lb://AUTHENTICATION
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/staff/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthenticationFilter

spring.cloud.gateway.routes[2].id=ACCOUNT-SERVICE
spring.cloud.gateway.routes[2].uri=lb://ACCOUNTMANAGEMENT
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/onboarding/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthenticationFilter

# Internal endpoints must never be reachable from outside
spring.cloud.gateway.routes[3].id=BLOCK-INTERNAL
spring.cloud.gateway.routes[3].uri=no://op
spring.cloud.gateway.routes[3].predicates[0]=Path=/internal/**
spring.cloud.gateway.routes[3].filters[0]=SetStatus=403

logging.level.org.springframework.cloud.gateway=DEBUG
